[template]
cargo_generate_version = "0.23"
include = ["**/*.template", ".template/**/*"]
ignore = [
    "target",
    "Cargo.lock",
    "*.sqlite3",
    "posts.db",
    ".template",
]

[placeholders.domain]
type = "string"
prompt = "Cloudflare domain for tunnel (leave empty to skip tunnel setup)"
default = ""

[hooks]
post = ["post-generate.rhai"]
