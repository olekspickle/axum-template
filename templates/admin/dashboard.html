<!DOCTYPE html>
<html>
    {% include "head.html" %}

    <body>
        <div class="flex min-h-screen">
            <aside class="w-64 bg-gray-800 text-white p-6">
                <h2 class="text-xl font-bold mb-8">Admin Panel</h2>
                <nav class="space-y-4">
                    <a href="/admin" class="block py-2 px-4 rounded hover:bg-gray-700">Dashboard</a>
                    <a href="/admin/projects" class="block py-2 px-4 rounded hover:bg-gray-700">Projects</a>
                    <a href="/admin/posts" class="block py-2 px-4 rounded hover:bg-gray-700">Posts</a>
                    <a href="/admin/team" class="block py-2 px-4 rounded hover:bg-gray-700">Team</a>
                    <a href="/" class="block py-2 px-4 rounded hover:bg-gray-700 text-gray-400">View Site</a>
                </nav>
            </aside>
            
            <main class="flex-1 p-8">
                <h1 class="text-3xl font-bold mb-8">{{ title }}</h1>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-lg font-semibold text-gray-700">Projects</h3>
                        <p class="text-3xl font-bold text-indigo-600 mt-2">Manage your portfolio</p>
                        <a href="/admin/projects" class="text-indigo-600 hover:underline mt-4 inline-block">View all &rarr;</a>
                    </div>
                    
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-lg font-semibold text-gray-700">Blog Posts</h3>
                        <p class="text-3xl font-bold text-indigo-600 mt-2">Write articles</p>
                        <a href="/admin/posts" class="text-indigo-600 hover:underline mt-4 inline-block">View all &rarr;</a>
                    </div>
                    
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-lg font-semibold text-gray-700">Team</h3>
                        <p class="text-3xl font-bold text-indigo-600 mt-2">Manage team</p>
                        <a href="/admin/team" class="text-indigo-600 hover:underline mt-4 inline-block">View all &rarr;</a>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
