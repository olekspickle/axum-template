<!DOCTYPE html>
<html>
    {% include "head.html" %}

    <body>
        {% include "nav.html" %}
        <main>
            <section class="py-16">
                <div class="container mx-auto">
                    <h1 class="text-4xl font-bold text-center mb-12">Projects</h1>
                    
                    {% for project in projects %}
                    <div class="mb-8 p-6 border rounded-lg">
                        <h2 class="text-2xl font-bold">{{ project.title }}</h2>
                        <p class="text-gray-600">{{ project.description }}</p>
                        <a href="/projects/{{ project.slug }}" class="text-indigo-600">View</a>
                    </div>
                    {% endfor %}
                </div>
            </section>
        </main>
        {% include "footer.html" %}
    </body>
</html>
