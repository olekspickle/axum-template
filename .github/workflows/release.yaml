name: release-flow

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version - in the form of v1.2.3'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  pkg_name: axum-template

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    outputs:
      version: ${{ inputs.version || steps.tag.outputs.tag }}

  build-linux:
    runs-on: ubuntu-latest
    needs:
      - get-version
    env:
      VERSION: ${{needs.get-version.outputs.version}}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Build release
        run: cargo build --release
      - name: Prepare release
        run: |
          chmod +x target/release/${{ env.pkg_name }}
          mv target/release/${{ env.pkg_name }} .
      - name: Bundle release
        run: tar -czf ${{ env.pkg_name }}_linux.tar.gz ${{ env.pkg_name }}
      - name: Upload package to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.pkg_name }}_linux.tar.gz
          path: ${{ env.pkg_name }}_linux.tar.gz
          retention-days: 1
          overwrite: true

  build-windows:
    runs-on: windows-latest
    needs:
      - get-version
    env:
      VERSION: ${{needs.get-version.outputs.version}}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Build release
        run: cargo build --release
      - name: Prepare release
        run: move target/release/${{ env.pkg_name }}.exe .
      - name: Bundle release
        run: Compress-Archive -Path ${{ env.pkg_name }}.exe -DestinationPath ${{ env.pkg_name }}_windows.zip
      - name: Upload package to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.pkg_name }}_windows.zip
          path: ${{ env.pkg_name }}_windows.zip
          retention-days: 1
          overwrite: true

  upload-release:
    runs-on: ubuntu-latest
    needs:
      - get-version
      - build-linux
      - build-windows
    env:
      VERSION: ${{needs.get-version.outputs.version}}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download all artifacts
        uses: actions/download-artifact@v8
      - name: Upload Linux release
        uses: svenstaro/upload-release-action@master
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.pkg_name }}_linux.tar.gz
          asset_name: ${{ env.pkg_name }}_${{ env.VERSION }}_linux.tar.gz
          release_name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          overwrite: true
      - name: Upload Windows release
        uses: svenstaro/upload-release-action@master
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.pkg_name }}_windows.zip
          asset_name: ${{ env.pkg_name }}_${{ env.VERSION }}_windows.zip
          release_name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          overwrite: true
